socks5_listen_addr = "127.0.0.1:1080"
http_listen_addr = "127.0.0.1:8080"  # optional, remove to disable HTTP proxy
server_addr = "127.0.0.1:8443"
cipher_suite = "chacha20-poly1305"
transport = "quic"
skip_cert_verify = true

# Must match a key generated with: cargo run -p prisma-cli -- gen-key
[identity]
client_id = "00000000-0000-0000-0000-000000000001"
auth_secret = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

# Port forwarding (reverse proxy) — expose local services through the server
# Each entry maps a local service to a port on the server
[[port_forwards]]
name = "my-web-app"
local_addr = "127.0.0.1:3000"
remote_port = 10080

[[port_forwards]]
name = "my-api"
local_addr = "127.0.0.1:8000"
remote_port = 10081

# CDN-compatible transports (WebSocket or gRPC through Cloudflare)
# transport = "ws"
# ws_url = "wss://your-domain.com/ws-tunnel"
# ws_host = "your-domain.com"                 # Override Host header if needed
# ws_extra_headers = [["X-Custom", "value"]]  # Custom headers

# transport = "grpc"
# grpc_url = "https://your-domain.com/tunnel.PrismaTunnel/Tunnel"

# XHTTP transport — HTTP-native tunneling through CDN
# transport = "xhttp"
# xhttp_mode = "stream-one"                         # "packet-up" | "stream-up" | "stream-one"
# xhttp_stream_url = "https://your-domain.com/api/v1/stream"   # stream-one/stream-up
# xhttp_upload_url = "https://your-domain.com/api/v1/upload"   # packet-up upload
# xhttp_download_url = "https://your-domain.com/api/v1/events" # packet-up download
# xhttp_extra_headers = [["X-Custom", "value"]]     # extra request headers

# XMUX connection pool — randomize connection lifecycles
# [xmux]
# max_connections_min = 1
# max_connections_max = 4
# max_concurrency_min = 8
# max_concurrency_max = 16
# max_lifetime_secs_min = 300
# max_lifetime_secs_max = 600
# max_requests_min = 100
# max_requests_max = 200

# Header obfuscation
# user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
# referer = "https://www.google.com/"

# Congestion control (QUIC only)
# [congestion]
# mode = "bbr"                               # "brutal" | "bbr" | "adaptive"
# target_bandwidth = "100mbps"               # For brutal/adaptive mode

# Port hopping (QUIC only) — must match server settings
# [port_hopping]
# enabled = true

# Salamander UDP obfuscation (QUIC only) — must match server password
# salamander_password = "my-obfuscation-key"

# Camouflage — must match server camouflage settings
# tls_on_tcp = true                           # Connect via TLS-on-TCP instead of plain TCP
# tls_server_name = "example.com"             # SNI for TLS (defaults to server_addr hostname)
# alpn_protocols = ["h2", "http/1.1"]         # TLS ALPN protocols

# DNS configuration
# [dns]
# mode = "direct"                             # "smart" | "fake" | "tunnel" | "direct"
# geosite_path = "geosite.dat"               # For smart mode (auto-downloaded if missing)
# fake_ip_range = "198.18.0.0/15"            # For fake mode
# upstream = "8.8.8.8:53"                    # Upstream DNS for smart/tunnel mode

# Rule-based routing — first match wins, default action is "proxy"
# [[routing.rules]]
# type = "domain-suffix"
# value = ".cn"
# action = "direct"                           # "proxy" | "direct" | "block"
#
# [[routing.rules]]
# type = "domain-keyword"
# value = "ads"
# action = "block"
#
# [[routing.rules]]
# type = "ip-cidr"
# value = "10.0.0.0/8"
# action = "direct"
#
# [[routing.rules]]
# type = "all"
# action = "proxy"

# PrismaUDP — Forward Error Correction for UDP relay
# Reduces packet loss impact for games without retransmission
# [udp_fec]
# enabled = true
# data_shards = 10                           # Original packets per FEC group
# parity_shards = 3                          # Parity packets (30% overhead)

# TUN mode (system-wide proxy)
# [tun]
# enabled = false
# device_name = "prisma-tun0"
# mtu = 1500
# include_routes = ["0.0.0.0/0"]
# exclude_routes = []                         # Server IP is auto-excluded
# dns = "fake"                                # DNS mode in TUN: "fake" | "tunnel"

[logging]
level = "info"
format = "pretty"
