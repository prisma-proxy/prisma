name: CI

on:
  push:
    branches: [master, main]
    paths:
      - 'crates/*/src/**'
      - 'crates/*/Cargo.toml'
      - 'crates/*/benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tools/prisma-mcp/src/**'
      - 'tools/prisma-mcp/package.json'
      - 'tools/prisma-mcp/tsconfig.json'
  pull_request:
    paths:
      - 'crates/*/src/**'
      - 'crates/*/Cargo.toml'
      - 'crates/*/benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'tools/prisma-mcp/src/**'
      - 'tools/prisma-mcp/package.json'
      - 'tools/prisma-mcp/tsconfig.json'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  NODE_VERSION: '22'

jobs:
  # ---------------------------------------------------------------------------
  # Rust: format check (fast, runs first for quick feedback)
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Rust: clippy lint (separate job for independent fast feedback)
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy

      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (workspace)
        run: cargo clippy --workspace --all-targets

  # ---------------------------------------------------------------------------
  # Rust: tests across platforms
  # ---------------------------------------------------------------------------
  test:
    name: Test / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --target ${{ matrix.target }}

      - name: Run doctests
        run: cargo test --workspace --doc --target ${{ matrix.target }}

  # ---------------------------------------------------------------------------
  # GUI: TypeScript check + Tauri Rust check
  # ---------------------------------------------------------------------------
  # NOTE: prisma-console has moved to github.com/prisma-proxy/prisma-console

  # ---------------------------------------------------------------------------
  # MCP Server: TypeScript type check
  # ---------------------------------------------------------------------------
  mcp-check:
    name: MCP Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tools/prisma-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tools/prisma-mcp

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: tools/prisma-mcp

  # NOTE: prisma-docs has moved to github.com/prisma-proxy/prisma-docs

  # ---------------------------------------------------------------------------
  # Summary gate — single status check for branch protection
  # ---------------------------------------------------------------------------
  ci-pass:
    name: CI Pass
    if: always()
    needs: [fmt, clippy, test, mcp-check]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate results
        run: |
          results=(
            "${{ needs.fmt.result }}"
            "${{ needs.clippy.result }}"
            "${{ needs.test.result }}"
            "${{ needs.mcp-check.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::CI failed — one or more jobs did not pass: ${results[*]}"
              exit 1
            fi
          done
          echo "All CI checks passed"
