name: CI

on:
  push:
    branches: [master, main]
    paths:
      - 'prisma-*/src/**'
      - 'prisma-*/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'prisma-gui/src/**'
      - 'prisma-gui/src-tauri/**'
      - 'prisma-gui/package.json'
      - 'prisma-gui/package-lock.json'
  pull_request:
    paths:
      - 'prisma-*/src/**'
      - 'prisma-*/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'prisma-gui/src/**'
      - 'prisma-gui/src-tauri/**'
      - 'prisma-gui/package.json'
      - 'prisma-gui/package-lock.json'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests
        run: cargo nextest run --workspace --target ${{ matrix.target }}

      - name: Run doctests
        run: cargo test --workspace --doc --target ${{ matrix.target }}

  gui-check:
    name: GUI Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: prisma-gui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: prisma-gui

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: prisma-gui
