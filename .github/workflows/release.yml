name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: prisma
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache

jobs:
  console:
    name: Build Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: prisma-console/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: prisma-console

      - name: Build static console
        run: npm run build
        working-directory: prisma-console

      - name: Package console
        run: tar -czf prisma-console.tar.gz -C prisma-console/out .

      - name: Upload console artifact
        uses: actions/upload-artifact@v7
        with:
          name: prisma-console
          path: prisma-console.tar.gz

  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (musl = fully static, no GLIBC dependency)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: prisma-linux-amd64
            musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            artifact: prisma-linux-arm64
            musl: true
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            artifact: prisma-linux-armv7
            cross: true
          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: prisma-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: prisma-darwin-arm64
          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: prisma-windows-amd64.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: prisma-windows-arm64.exe
          # FreeBSD
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            artifact: prisma-freebsd-amd64
            cross: true
            no-default-features: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install musl toolchain for static Linux builds
      - name: Install musl-tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Install cross for targets that need it
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # Build with cross or cargo
      - name: Build (cross)
        if: matrix.cross && !matrix.no-default-features
        run: cross build --release --target ${{ matrix.target }} -p prisma-cli

      - name: Build (cross, no default features)
        if: matrix.cross && matrix.no-default-features
        run: cross build --release --target ${{ matrix.target }} -p prisma-cli --no-default-features

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p prisma-cli

      # Determine binary path and rename
      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
          chmod +x "$BIN"
          cp "$BIN" "${{ matrix.artifact }}"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" "${{ matrix.artifact }}"

      # Generate checksum
      - name: Checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"

      - name: Checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.artifact }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii "${{ matrix.artifact }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  gui:
    name: Build GUI (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: macOS (Universal)
            os: macos-latest
            target: universal-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: gui-${{ matrix.target }}
          workspaces: prisma-gui/src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: prisma-gui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: prisma-gui

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build Tauri app
        run: tauri build --target ${{ matrix.target }}
        working-directory: prisma-gui

      # Collect portable binary
      - name: Collect artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path gui-artifacts
          Copy-Item "prisma-gui/src-tauri/target/x86_64-pc-windows-msvc/release/prisma-gui.exe" "gui-artifacts/prisma-gui-windows-x64.exe"
          Get-ChildItem gui-artifacts/

      - name: Collect artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p gui-artifacts
          BASE="prisma-gui/src-tauri/target/universal-apple-darwin/release"
          # Prefer the DMG if bundling produced one
          DMG=$(find "${BASE}/bundle/dmg" -name '*.dmg' 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" gui-artifacts/Prisma-macos-universal.dmg
          fi
          # Also copy the portable binary from inside the .app bundle
          APP_BIN="${BASE}/bundle/macos/Prisma.app/Contents/MacOS/Prisma"
          if [ -f "$APP_BIN" ]; then
            cp "$APP_BIN" gui-artifacts/prisma-gui-macos-universal
          elif [ -f "${BASE}/prisma-gui" ]; then
            cp "${BASE}/prisma-gui" gui-artifacts/prisma-gui-macos-universal
          fi
          ls -la gui-artifacts/

      - name: Upload GUI artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gui-${{ matrix.label }}
          path: gui-artifacts/*

  release:
    name: Create Release
    needs: [console, build, gui]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          # CLI binaries + GUI portable binaries (all named prisma-*)
          find artifacts -type f \( -name 'prisma-*' \) -exec cp {} release/ \;
          ls -la release/
          count=$(find release -type f ! -name '*.sha256' ! -name 'checksums-*' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error::No artifacts found — all builds failed. Aborting release."
            exit 1
          fi
          echo "Found $count artifact(s)"

      - name: Generate checksums file
        run: |
          cd release
          # Checksums for CLI binaries (from individual .sha256 files)
          cat *.sha256 2>/dev/null > checksums-sha256.txt || true
          # Add checksums for GUI portable binaries
          for f in prisma-gui-*; do
            [ -f "$f" ] || continue
            [ -f "${f}.sha256" ] && continue
            sha256sum "$f" >> checksums-sha256.txt
          done
          cat checksums-sha256.txt

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          INSTALL_URL="https://raw.githubusercontent.com/${REPO}/master/scripts"

          # Previous tag for the commit range and comparison link
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="https://github.com/${REPO}/compare/${PREV_TAG}...${TAG}"
          else
            RANGE="HEAD"
            COMPARE_URL="https://github.com/${REPO}/commits/${TAG}"
          fi

          # Categorize commits by conventional-commit prefix; strip the type+scope prefix
          strip() { sed -E 's/^- [a-z]+(\([^)]+\))?!?: /- /'; }
          FEATS=$(git log "$RANGE" --pretty=format:"- %s" --no-merges 2>/dev/null \
            | grep -E "^- feat" | strip || true)
          FIXES=$(git log "$RANGE" --pretty=format:"- %s" --no-merges 2>/dev/null \
            | grep -E "^- fix" | strip || true)
          PERFS=$(git log "$RANGE" --pretty=format:"- %s" --no-merges 2>/dev/null \
            | grep -E "^- perf" | strip || true)
          REFACTORS=$(git log "$RANGE" --pretty=format:"- %s" --no-merges 2>/dev/null \
            | grep -E "^- refactor" | strip || true)
          OTHERS=$(git log "$RANGE" --pretty=format:"- %s" --no-merges 2>/dev/null \
            | grep -Ev "^- (feat|fix|perf|refactor|chore|docs|ci|test|build|style|bench)" || true)

          CHECKSUMS=$(cat release/checksums-sha256.txt)

          {
            echo "## What's Changed"
            echo ""

            if [ -n "$FEATS" ]; then
              echo "### ✨ New Features"
              echo ""
              echo "$FEATS"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              echo ""
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$PERFS" ]; then
              echo "### ⚡ Performance"
              echo ""
              echo "$PERFS"
              echo ""
            fi

            if [ -n "$REFACTORS" ]; then
              echo "### 🔧 Refactoring"
              echo ""
              echo "$REFACTORS"
              echo ""
            fi

            if [ -n "$OTHERS" ]; then
              echo "### 📝 Other Changes"
              echo ""
              echo "$OTHERS"
              echo ""
            fi

            echo "---"
            echo ""
            echo "## 📦 Installation"
            echo ""
            echo "### Quick Install"
            echo ""
            echo "**Linux / macOS / FreeBSD:**"
            echo '```bash'
            echo "curl -fsSL ${INSTALL_URL}/install.sh | bash"
            echo '```'
            echo ""
            echo "**Windows (PowerShell):**"
            echo '```powershell'
            echo "irm ${INSTALL_URL}/install.ps1 | iex"
            echo '```'
            echo ""
            echo "### Manual Download"
            echo ""
            echo "| Platform | Architecture | Binary |"
            echo "|----------|-------------|--------|"
            echo "| 🐧 Linux | x86\_64 | [prisma-linux-amd64](${BASE_URL}/prisma-linux-amd64) |"
            echo "| 🐧 Linux | ARM64 | [prisma-linux-arm64](${BASE_URL}/prisma-linux-arm64) |"
            echo "| 🐧 Linux | ARMv7 | [prisma-linux-armv7](${BASE_URL}/prisma-linux-armv7) |"
            echo "| 🍎 macOS | Intel | [prisma-darwin-amd64](${BASE_URL}/prisma-darwin-amd64) |"
            echo "| 🍎 macOS | Apple Silicon | [prisma-darwin-arm64](${BASE_URL}/prisma-darwin-arm64) |"
            echo "| 🪟 Windows | x86\_64 | [prisma-windows-amd64.exe](${BASE_URL}/prisma-windows-amd64.exe) |"
            echo "| 🪟 Windows | ARM64 | [prisma-windows-arm64.exe](${BASE_URL}/prisma-windows-arm64.exe) |"
            echo "| 😈 FreeBSD | x86\_64 | [prisma-freebsd-amd64](${BASE_URL}/prisma-freebsd-amd64) |"
            echo ""
            echo "### Desktop App (GUI) — Portable"
            echo ""
            echo "| Platform | Binary |"
            echo "|----------|--------|"
            echo "| 🪟 Windows | [prisma-gui-windows-x64.exe](${BASE_URL}/prisma-gui-windows-x64.exe) |"
            echo "| 🍎 macOS (Universal) | [Prisma-macos-universal.dmg](${BASE_URL}/Prisma-macos-universal.dmg) |"

            echo ""
            echo "> Verify integrity: \`sha256sum -c checksums-sha256.txt\` (Linux/macOS) · \`Get-FileHash\` (Windows)"
            echo ""
            echo "---"
            echo ""
            echo "## 🔒 SHA256 Checksums"
            echo ""
            echo '```'
            echo "$CHECKSUMS"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "**Full Changelog**: ${COMPARE_URL}"
          } > release-notes.md

          echo "=== Release Notes Preview ==="
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release create "$TAG" \
            --title "Prisma $TAG" \
            --notes-file release-notes.md \
            release/*
