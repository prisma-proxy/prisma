name: Benchmark Prisma vs Xray-core vs sing-box
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Benchmark mode: full or quick'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
  schedule:
    - cron: '0 4 * * 1'  # Weekly Monday 4am UTC

permissions:
  contents: write

concurrency:
  group: benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download latest Prisma release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --pattern 'prisma-linux-amd64' --dir . || {
            echo "No release found, building from source as fallback"
            rustup default stable
            cargo build --release -p prisma-cli
            cp target/release/prisma prisma-linux-amd64
          }
          chmod +x prisma-linux-amd64
          mv prisma-linux-amd64 prisma

      - name: Download latest Xray-core release
        run: |
          mkdir -p xray
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray

      - name: Download latest sing-box release
        run: |
          mkdir -p sing-box
          SB_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep tag_name | cut -d'"' -f4)
          wget -q "https://github.com/SagerNet/sing-box/releases/download/${SB_VERSION}/sing-box-${SB_VERSION#v}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SB_VERSION#v}-linux-amd64.tar.gz" --strip-components=1 -C sing-box
          chmod +x sing-box/sing-box

      - name: Run benchmarks
        env:
          BENCHMARK_MODE: ${{ github.event_name == 'push' && 'quick' || (github.event.inputs.mode || 'full') }}
        run: |
          chmod +x scripts/benchmark.sh
          ./scripts/benchmark.sh

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benchmark-results/

      - name: Consolidate benchmark results
        env:
          BENCHMARK_MODE: ${{ github.event_name == 'push' && 'quick' || (github.event.inputs.mode || 'full') }}
        run: |
          python3 << 'PYEOF'
          import json, glob, os, sys
          from datetime import datetime, timezone

          SECURITY_WEIGHTS = {
              "enc": 0.25,
              "fs": 0.20,
              "tar": 0.20,
              "pdr": 0.15,
              "ar": 0.10,
              "auth": 0.10,
          }

          SECURITY_DB = {
              "prisma-quic":     {"enc": 10, "fs": 10, "tar": 3, "pdr": 8, "ar": 10, "auth": 10},
              "prisma-tcp":      {"enc": 10, "fs": 10, "tar": 3, "pdr": 7, "ar": 10, "auth": 10},
              "prisma-shaped":   {"enc": 10, "fs": 10, "tar": 6, "pdr": 8, "ar": 10, "auth": 10},
              "prisma-quic-aes": {"enc": 10, "fs": 10, "tar": 3, "pdr": 8, "ar": 10, "auth": 10},
              "prisma-tonly":    {"enc": 5,  "fs": 10, "tar": 3, "pdr": 7, "ar": 10, "auth": 10},
              "prisma-ws":       {"enc": 10, "fs": 10, "tar": 3, "pdr": 9, "ar": 10, "auth": 10},
              "prisma-bucket":   {"enc": 10, "fs": 10, "tar": 9, "pdr": 7, "ar": 10, "auth": 10},
              "xray-vless-tls":  {"enc": 3,  "fs": 7,  "tar": 1, "pdr": 5, "ar": 2,  "auth": 3},
              "xray-vless-xtls": {"enc": 3,  "fs": 7,  "tar": 1, "pdr": 4, "ar": 2,  "auth": 3},
              "xray-vmess-tls":  {"enc": 8,  "fs": 7,  "tar": 1, "pdr": 6, "ar": 5,  "auth": 5},
              "xray-trojan-tls": {"enc": 3,  "fs": 7,  "tar": 1, "pdr": 5, "ar": 2,  "auth": 4},
              "xray-ss-aead":    {"enc": 6,  "fs": 3,  "tar": 1, "pdr": 3, "ar": 4,  "auth": 4},
              "xray-ss2022":     {"enc": 7,  "fs": 5,  "tar": 1, "pdr": 4, "ar": 7,  "auth": 6},
              "xray-vless-ws":   {"enc": 3,  "fs": 7,  "tar": 1, "pdr": 6, "ar": 2,  "auth": 3},
              "xray-vless-grpc": {"enc": 3,  "fs": 7,  "tar": 1, "pdr": 5, "ar": 2,  "auth": 3},
              "singbox-vless-tls":   {"enc": 3,  "fs": 7,  "tar": 1, "pdr": 5, "ar": 2,  "auth": 3},
              "singbox-vmess-tls":   {"enc": 8,  "fs": 7,  "tar": 1, "pdr": 5, "ar": 3,  "auth": 5},
              "singbox-trojan-tls":  {"enc": 7,  "fs": 7,  "tar": 1, "pdr": 5, "ar": 2,  "auth": 3},
              "singbox-ss-aead":     {"enc": 6,  "fs": 3,  "tar": 1, "pdr": 3, "ar": 3,  "auth": 5},
              "singbox-ss2022":      {"enc": 6,  "fs": 4,  "tar": 1, "pdr": 3, "ar": 4,  "auth": 5},
              "singbox-vless-ws":    {"enc": 5,  "fs": 7,  "tar": 1, "pdr": 3, "ar": 2,  "auth": 3},
              "singbox-hysteria2":   {"enc": 8,  "fs": 9,  "tar": 4, "pdr": 7, "ar": 7,  "auth": 7},
              "singbox-tuic":        {"enc": 8,  "fs": 9,  "tar": 3, "pdr": 6, "ar": 7,  "auth": 7},
              "singbox-vmess-ws":    {"enc": 8,  "fs": 7,  "tar": 1, "pdr": 6, "ar": 3,  "auth": 5},
              "singbox-trojan-ws":   {"enc": 7,  "fs": 7,  "tar": 1, "pdr": 6, "ar": 2,  "auth": 3},
              "singbox-ss2022-relay":{"enc": 7,  "fs": 5,  "tar": 1, "pdr": 4, "ar": 5,  "auth": 6},
              "singbox-vless-grpc":  {"enc": 3,  "fs": 7,  "tar": 1, "pdr": 5, "ar": 2,  "auth": 3},
              "singbox-vless-http2": {"enc": 3,  "fs": 7,  "tar": 1, "pdr": 5, "ar": 2,  "auth": 3},
          }

          SCENARIO_NAMES = {
              "baseline":         ("Baseline (no proxy)", "baseline"),
              "prisma-quic":      ("Prisma QUIC",         "prisma"),
              "prisma-tcp":       ("Prisma TCP+TLS",      "prisma"),
              "prisma-shaped":    ("Prisma (shaped)",      "prisma"),
              "prisma-quic-aes":  ("Prisma QUIC AES",     "prisma"),
              "prisma-tonly":     ("Prisma T-Only",        "prisma"),
              "prisma-ws":        ("Prisma WS+TLS",        "prisma"),
              "prisma-bucket":    ("Prisma (bucket)",      "prisma"),
              "xray-vless-tls":   ("Xray VLESS+TLS",      "xray"),
              "xray-vless-xtls":  ("Xray VLESS+XTLS",     "xray"),
              "xray-vmess-tls":   ("Xray VMess+TLS",      "xray"),
              "xray-trojan-tls":  ("Xray Trojan+TLS",     "xray"),
              "xray-ss-aead":     ("Xray SS AEAD",        "xray"),
              "xray-ss2022":      ("Xray SS-2022",        "xray"),
              "xray-vless-ws":    ("Xray VLESS+WS",       "xray"),
              "xray-vless-grpc":  ("Xray VLESS+gRPC",     "xray"),
              "singbox-vless-tls":   ("sing-box VLESS+TLS",   "singbox"),
              "singbox-vmess-tls":   ("sing-box VMess+TLS",   "singbox"),
              "singbox-trojan-tls":  ("sing-box Trojan+TLS",  "singbox"),
              "singbox-ss-aead":     ("sing-box SS AEAD",     "singbox"),
              "singbox-ss2022":      ("sing-box SS-2022",     "singbox"),
              "singbox-vless-ws":    ("sing-box VLESS+WS",    "singbox"),
              "singbox-hysteria2":   ("sing-box Hysteria2",   "singbox"),
              "singbox-tuic":        ("sing-box TUIC v5",     "singbox"),
              "singbox-vmess-ws":    ("sing-box VMess+WS",    "singbox"),
              "singbox-trojan-ws":   ("sing-box Trojan+WS",   "singbox"),
              "singbox-ss2022-relay":("sing-box SS2022 Relay", "singbox"),
              "singbox-vless-grpc":  ("sing-box VLESS+gRPC",  "singbox"),
              "singbox-vless-http2": ("sing-box VLESS+H2",    "singbox"),
          }

          def compute_security_score(key):
              dims = SECURITY_DB.get(key)
              if not dims:
                  return 0
              return round(sum(dims[d] * SECURITY_WEIGHTS[d] for d in SECURITY_WEIGHTS) * 10)

          def security_tier(score):
              if score >= 85:
                  return "S"
              if score >= 70:
                  return "A"
              if score >= 55:
                  return "B"
              return "C"

          # Read all per-scenario JSON files
          result_files = sorted(glob.glob("benchmark-results/*.json"))
          scenarios = []

          for fpath in result_files:
              fname = os.path.basename(fpath).replace(".json", "")
              if fname == "summary":
                  continue
              try:
                  with open(fpath) as f:
                      raw = json.load(f)
              except (json.JSONDecodeError, IOError):
                  continue

              label = raw.get("label", fname)
              name_info = SCENARIO_NAMES.get(label, (label, "baseline"))
              name, group = name_info

              sec_score = compute_security_score(label)
              sec_tier = security_tier(sec_score) if group != "baseline" else "-"
              if group == "baseline":
                  sec_score = 0

              scenario = {
                  "label": label,
                  "name": name,
                  "group": group,
                  "download_mbps": float(raw.get("download_mbps", 0)),
                  "upload_mbps": float(raw.get("upload_mbps", 0)),
                  "latency_ms": float(raw.get("latency_ms", 0)),
                  "handshake_ms": float(raw.get("handshake_ms", 0)),
                  "concurrent_mbps": float(raw.get("concurrent_mbps", 0)),
                  "memory_idle_kb": int(raw.get("memory_idle_kb", 0)),
                  "memory_load_kb": int(raw.get("memory_load_kb", 0)),
                  "cpu_avg_pct": float(raw.get("cpu_avg_pct", 0)),
                  "download_cv_pct": float(raw.get("download_cv_pct", 0)),
                  "concurrent_cv_pct": float(raw.get("concurrent_cv_pct", 0)),
                  "security_score": sec_score,
                  "security_tier": sec_tier,
                  "download_small_mbps": float(raw.get("download_small_mbps", 0)),
                  "download_medium_mbps": float(raw.get("download_medium_mbps", 0)),
                  "download_large_mbps": float(raw.get("download_large_mbps", 0)),
                  "upload_small_mbps": float(raw.get("upload_small_mbps", 0)),
                  "upload_medium_mbps": float(raw.get("upload_medium_mbps", 0)),
                  "upload_large_mbps": float(raw.get("upload_large_mbps", 0)),
                  "cpu_sd_pct": float(raw.get("cpu_sd_pct", 0)),
                  "memory_load_sd_kb": int(raw.get("memory_load_sd_kb", 0)),
                  "download_stable": bool(raw.get("download_stable", True)),
                  "upload_stable": bool(raw.get("upload_stable", True)),
                  "concurrent_stable": bool(raw.get("concurrent_stable", True)),
              }
              scenarios.append(scenario)

          if not scenarios:
              print("No benchmark result files found, skipping consolidation")
              sys.exit(0)

          benchmark_mode = os.environ.get("BENCHMARK_MODE", "full")
          if benchmark_mode == "quick":
              payload_desc = "64MB"
              runs_desc = "3-run MAD-filtered"
          else:
              payload_desc = "1MB+32MB+256MB"
              runs_desc = "7-run MAD-filtered"
          env_desc = f"ubuntu-latest, loopback, {payload_desc} payload, {runs_desc} median"

          consolidated = {
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "environment": env_desc,
              "scenarios": scenarios,
              "history": [],
          }

          # Read existing data to preserve history
          output_path = "docs/static/data/benchmark-results.json"
          os.makedirs(os.path.dirname(output_path), exist_ok=True)

          existing_scenarios = []
          try:
              with open(output_path) as f:
                  existing = json.load(f)
              existing_scenarios = existing.get("scenarios", [])
              if existing.get("history"):
                  consolidated["history"] = existing["history"]
              # Full mode: append previous run as history entry (keep last 12 weeks)
              if benchmark_mode == "full" and existing.get("timestamp") and existing.get("scenarios"):
                  history_entry = {
                      "timestamp": existing["timestamp"],
                      "scenarios": existing["scenarios"],
                  }
                  consolidated["history"].append(history_entry)
                  consolidated["history"] = consolidated["history"][-12:]
          except (FileNotFoundError, json.JSONDecodeError):
              pass

          # Quick mode: merge into existing data (update only benchmarked scenarios)
          if benchmark_mode == "quick" and existing_scenarios:
              existing_by_label = {s["label"]: s for s in existing_scenarios}
              for s in scenarios:
                  existing_by_label[s["label"]] = s
              consolidated["scenarios"] = list(existing_by_label.values())
              if existing.get("environment"):
                  consolidated["environment"] = existing["environment"] + " (quick update)"

          with open(output_path, "w") as f:
              json.dump(consolidated, f, indent=2)

          mode_label = benchmark_mode
          print(f"Consolidated {len(scenarios)} scenarios ({mode_label} mode) into {output_path}")
          PYEOF

      - name: Commit benchmark results to master
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: 'chore(benchmarks): update benchmark results [skip ci]'
          file_pattern: 'docs/static/data/benchmark-results.json'
          branch: master
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f benchmark-results/summary.md ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body-file benchmark-results/summary.md
          fi
