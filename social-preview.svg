<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <!-- Logo gradient -->
    <linearGradient id="prism-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <!-- Logo glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Accent glow circle behind logo -->
  <circle cx="640" cy="230" r="120" fill="#2563eb" opacity="0.08" filter="url(#glow)"/>

  <!-- Prisma logo (scaled to 160x160, centered at 640,230) -->
  <g transform="translate(560, 150) scale(5)">
    <path d="M16 2 L28 10 L28 22 L16 30 L4 22 L4 10 Z" fill="url(#prism-grad)" stroke="none"/>
    <path d="M16 7 L22 11 L22 21 L16 25 L10 21 L10 11 Z" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.6"/>
    <path d="M16 10 L20.5 16 L11.5 16 Z" fill="#ffffff" opacity="0.9"/>
    <line x1="20.5" y1="16" x2="24" y2="13" stroke="#93c5fd" stroke-width="1" opacity="0.8"/>
    <line x1="20.5" y1="16" x2="24" y2="16" stroke="#bfdbfe" stroke-width="1" opacity="0.8"/>
    <line x1="20.5" y1="16" x2="24" y2="19" stroke="#dbeafe" stroke-width="1" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="640" y="400" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="-1">
    Prisma
  </text>

  <!-- Tagline -->
  <text x="640" y="450" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#94A3B8">
    High-Performance Encrypted Proxy System
  </text>

  <!-- Tech badges -->
  <text x="640" y="510" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="16" font-weight="500" fill="#64748B" letter-spacing="2">
    RUST · QUIC · TLS 1.3 · MULTI-TRANSPORT · ADAPTIVE CC
  </text>

  <!-- Subtle bottom accent line -->
  <rect x="440" y="550" width="400" height="2" rx="1" fill="url(#prism-grad)" opacity="0.4"/>

  <!-- Version badge -->
  <text x="640" y="585" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">
    v2.23.0
  </text>
</svg>
