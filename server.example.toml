listen_addr = "0.0.0.0:8443"
quic_listen_addr = "0.0.0.0:8443"

[tls]
cert_path = "prisma-cert.pem"
key_path = "prisma-key.pem"

# Generate keys with: cargo run -p prisma-cli -- gen-key
[[authorized_clients]]
id = "00000000-0000-0000-0000-000000000001"
auth_secret = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
name = "my-client"
# Per-client bandwidth limits (optional)
# bandwidth_up = "100mbps"                    # Upload rate limit
# bandwidth_down = "500mbps"                  # Download rate limit
# Traffic quota (optional)
# quota = "100GB"                             # Total transfer quota
# quota_period = "monthly"                    # "daily" | "weekly" | "monthly"

[logging]
level = "info"
format = "pretty"

[performance]
max_connections = 1024
connection_timeout_secs = 300

# Port forwarding (reverse proxy) — allow clients to expose local services
[port_forwarding]
enabled = true
port_range_start = 10000
port_range_end = 20000

# Per-frame padding — randomize data frame sizes to resist traffic analysis
[padding]
min = 0      # minimum padding bytes per frame
max = 256    # maximum padding bytes per frame

# DNS upstream for tunneled DNS queries (CMD_DNS_QUERY)
# dns_upstream = "8.8.8.8:53"                    # Default upstream DNS

# Congestion control (QUIC only)
# [congestion]
# mode = "bbr"                               # "brutal" | "bbr" | "adaptive"
# target_bandwidth = "100mbps"               # For brutal/adaptive mode

# Port hopping (QUIC only) — rotate UDP ports to evade port-based blocking
# [port_hopping]
# enabled = true
# base_port = 10000
# port_range = 50000                          # Ports 10000-60000
# interval_secs = 60                          # Hop every 60 seconds
# grace_period_secs = 10                      # Accept on old port for 10s after hop

# Camouflage — anti-active-detection for censorship resistance
# [camouflage]
# enabled = true
# tls_on_tcp = true                           # Wrap TCP transport in TLS (reuses [tls] cert/key)
# fallback_addr = "example.com:443"           # Decoy site for non-Prisma connections
# alpn_protocols = ["h2", "http/1.1"]         # TLS ALPN (also used for QUIC when enabled)
# salamander_password = "my-obfuscation-key"  # Salamander UDP obfuscation (QUIC only)

# CDN-compatible transport (WebSocket + gRPC through Cloudflare)
# Runs an HTTPS server on port 443 that tunnels PrismaVeil inside WebSocket/gRPC
# and reverse-proxies cover traffic to look like a real website.
# [cdn]
# enabled = true
# listen_addr = "0.0.0.0:443"
# ws_tunnel_path = "/ws-tunnel"                  # WebSocket tunnel path
# grpc_tunnel_path = "/tunnel.PrismaTunnel"      # gRPC tunnel service path
# cover_upstream = "http://127.0.0.1:3000"       # Reverse proxy to real website
# cover_static_dir = "/var/www/html"             # OR serve static files as cover
# trusted_proxies = ["173.245.48.0/20"]          # Cloudflare IP ranges (optional)
# expose_management_api = true                   # Expose mgmt API through CDN
# management_api_path = "/prisma-mgmt"           # Subpath for management API
#
# [cdn.tls]
# cert_path = "origin-cert.pem"                  # Cloudflare Origin Certificate
# key_path = "origin-key.pem"
#
# XHTTP transport paths (HTTP-native tunneling)
# xhttp_upload_path = "/api/v1/upload"           # packet-up upload endpoint
# xhttp_download_path = "/api/v1/events"         # packet-up download (SSE) endpoint
# xhttp_stream_path = "/api/v1/stream"           # stream-one/stream-up endpoint
# xhttp_mode = "stream-one"                      # "packet-up" | "stream-up" | "stream-one"
# xhttp_nosse = false                            # disable SSE wrapping for download
#
# Header obfuscation
# response_server_header = "nginx"               # override Server header
# padding_header = true                          # add X-Padding response header
# enable_sse_disguise = false                    # wrap download in SSE format
# xhttp_extra_headers = [["X-Custom", "value"]]  # extra response headers

# Management API + dashboard
[management_api]
enabled = true
listen_addr = "127.0.0.1:9090"
auth_token = "your-secure-token-here"
dashboard_dir = "./prisma-dashboard/out"  # Path to built dashboard static files
# cors_origins = ["http://localhost:3000"]  # Only needed for external dashboard dev
